<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAS | كتب دليل الصيانة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان والهوية المتطابقة تماماً مع كود موقعك الأساسي */
        :root { 
            --bg-color: #0b0f17; 
            --panel-bg: #131a26; 
            --accent-color: #00ff66; 
            --text-color: #94a3b8; 
            --text-bright: #ffffff; 
            --border-color: #1e293b; 
            --transition-speed: 0.25s; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; }
        
        header { position: fixed; top: 0; left: 0; width: 100%; background-color: rgba(19, 26, 38, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .right-side { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--text-bright); letter-spacing: 1.5px; }
        
        .sub-header { position: fixed; top: 65px; left: 0; width: 100%; background-color: #111722; padding: 8px 20px; border-bottom: 1px solid var(--border-color); z-index: 999; font-size: 13px; color: var(--accent-color); font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sub-header i { font-size: 11px; color: var(--text-color); }
        .sub-header span.current-page { color: var(--text-bright); }

        .dropdown { position: relative; }
        .dropdown-btn { background: none; color: var(--text-color); font-size: 20px; border: none; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all var(--transition-speed); }
        .dropdown-btn:hover { color: var(--accent-color); background-color: rgba(255, 255, 255, 0.05); }
        .dropdown-content { display: none; position: absolute; right: 0; background-color: var(--panel-bg); min-width: 240px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color); border-radius: 12px; z-index: 10; margin-top: 8px; overflow: hidden; }
        .dropdown-content a { color: var(--text-color); padding: 14px 16px; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: all var(--transition-speed); border-bottom: 1px solid rgba(255,255,255,0.02); }
        .dropdown-content a:hover { background-color: rgba(0, 255, 102, 0.08); color: var(--accent-color); padding: 14px 22px; }
        .dropdown.active .dropdown-content { display: block; animation: fadeIn 0.2s ease-out; }
        
        .search-container { position: relative; flex-grow: 1; max-width: 380px; }
        .search-input { width: 100%; padding: 10px 42px 10px 18px; font-size: 14px; background-color: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-bright); transition: all var(--transition-speed); }
        .search-input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 255, 102, 0.15); }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #64748b; }
        
        main { flex-grow: 1; max-width: 1200px; width: 100%; margin: 130px auto 40px auto; padding: 0 20px; animation: slideUp 0.35s ease-out; }
        .page-title { font-size: 26px; color: var(--text-bright); margin-bottom: 25px; position: relative; padding-right: 15px; font-weight: 700; }
        .page-title::before { content: ''; position: absolute; right: 0; top: 15%; height: 70%; width: 4px; background-color: var(--accent-color); border-radius: 2px; }
        
        /* حاوية الكتب والصفوف */
        .books-list-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        
        .book-row { 
            background-color: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 14px; 
            padding: 18px 22px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all var(--transition-speed); 
        }
        
        .book-row:hover { 
            transform: translateX(-4px); 
            border-color: var(--accent-color); 
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); 
        }
        
        .book-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .book-info i {
            font-size: 20px;
            color: var(--accent-color); 
        }

        .book-row h3 { 
            color: var(--text-bright); 
            font-size: 17px; 
            font-weight: 600;
        }

        .book-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .book-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all var(--transition-speed);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* زر الفتح */
        .btn-open {
            background-color: rgba(0, 255, 102, 0.05);
            color: var(--accent-color);
            border: 1px solid rgba(0, 255, 102, 0.2);
        }

        .btn-open:hover {
            background-color: var(--accent-color);
            color: #0b0f17;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.3);
        }

        /* زر التنزيل */
        .btn-download {
            background-color: var(--accent-color);
            color: #0b0f17;
            border: 1px solid var(--accent-color);
        }

        .btn-download:hover {
            background-color: #00d455;
            border-color: #00d455;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) { 
            .book-row { flex-direction: column; align-items: flex-start; gap: 15px; } 
            .book-actions { width: 100%; justify-content: flex-end; }
        }
        @media (max-width: 500px) { 
            .header-container { padding: 10px 15px; } 
            .logo { font-size: 20px; }
            main { margin-top: 120px; } 
        }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="right-side">
                <div class="logo">DAS</div>
                <div class="dropdown" id="pagesDropdown">
                    <button class="dropdown-btn" onclick="toggleDropdown()"><i class="fa-solid fa-bars"></i></button>
                    <div class="dropdown-content">
                        <a href="index.html"><i class="fa-solid fa-house"></i>الرئيسية</a>
                        <a href="fault-codes.html"><i class="fa-solid fa-barcode"></i>أكواد الأعطال (DTC)</a>
                        <a href="main-faults.html"><i class="fa-solid fa-triangle-exclamation"></i>أهم الأعطال الشائعة</a>
                        <a href="ecu-controllers.html"><i class="fa-solid fa-microchip"></i>الكنترولات (ECUs)</a>
                        <a href="diagrams.html"><i class="fa-solid fa-bezier-curve"></i>المخططات الكهربائية</a>
                        <a href="books.html"><i class="fa-solid fa-book"></i>كتب دليل الصيانة</a>
                    </div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="globalSearch" placeholder="ابحث في هذه الصفحة..." onkeyup="liveSearch()">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
            </div>
        </div>
    </header>
    
    <div class="sub-header">
        <span>الرئيسية</span> <i class="fa-solid fa-chevron-left"></i> <span class="current-page">كتب دليل الصيانة</span>
    </div>

    <main>
        <h2 class="page-title">كتب أدلة الصيانة والتشغيل الجاهزة</h2>
        
        <div class="books-list-container">
            
            <div class="book-row searchable">
                <div class="book-info">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <h3>كنترول mr</h3>
                </div>
                <div class="book-actions">
                    <a href="DAS.pdf" target="_blank" class="book-btn btn-open"><i class="fa-solid fa-eye"></i> فتح</a>
                    <button onclick="downloadFileForcefully('DAS.pdf', 'كنترول mr.pdf')" class="book-btn btn-download">
                        <i class="fa-solid fa-download"></i> تنزيل
                    </button>
                </div>
            </div>

            </div>
    </main>

<script>
function toggleDropdown() {
    document.getElementById("pagesDropdown").classList.toggle("active");
}

window.onclick = function(event) {
    if (!event.target.matches('.dropdown-btn') && !event.target.matches('.dropdown-btn *')) {
        var dropdowns = document.getElementsByClassName("dropdown");
        for (var i = 0; i < dropdowns.length; i++) {
            if (dropdowns[i].classList.contains('active')) {
                dropdowns[i].classList.remove('active');
            }
        }
    }
}

function liveSearch() {
    let filter = document.getElementById('globalSearch').value.toLowerCase();
    let rows = document.querySelectorAll('.searchable');

    rows.forEach(row => {
        let text = row.querySelector('.book-info h3').textContent || row.querySelector('.book-info h3').innerText;
        row.style.display = text.toLowerCase().indexOf(filter) > -1 ? "" : "none";
    });
}

// التقنية المضمونة 100% لتنزيل الملفات والإجبار عليها دون فتحها في المتصفح
function downloadFileForcefully(fileUrl, fileName) {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', fileUrl, true);
    xhr.responseType = 'blob';
    
    xhr.onload = function () {
        if (xhr.status === 200) {
            const blob = xhr.response;
            // تحويل الملف إلى رابط ثنائي فريد وخاص بالتحميل فقط
            const blobUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = blobUrl;
            link.download = fileName;
            
            // إجبار المتصفح على الضغط الوهمي لبدء التحميل فوراً
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(blobUrl);
        }
    };
    xhr.send();
}
</script>
</body>
</html>
