<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoDiag Pro</title>

<style>

/* ====== أساسيات ====== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui, Tahoma;
}

body{
    background:#05070c;
    color:#e6edf3;
}

/* ====== الهيدر ====== */
header{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(10,15,25,0.8);
    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    z-index:1000;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:#4cc9f0;
}

/* ====== القائمة ====== */
nav a{
    color:#cbd5e1;
    text-decoration:none;
    margin:0 10px;
    font-size:14px;
}

nav a:hover{
    color:#4cc9f0;
}

/* ====== الصفحة الرئيسية ====== */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:80px 20px 20px;

    text-align:center;
}

.hero h1{
    font-size:36px;
    margin-bottom:10px;
}

.hero p{
    color:#94a3b8;
    margin-bottom:20px;
}

/* ====== البحث ====== */
.search{
    width:100%;
    max-width:700px;
    display:flex;
    gap:10px;
}

.search input{
    flex:1;
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background:#0f172a;
    color:white;
    font-size:16px;
    outline:none;
}

.search button{
    padding:15px 20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4cc9f0,#4361ee);
    color:white;
    cursor:pointer;
}

/* ====== النتائج ====== */
.results{
    width:100%;
    max-width:700px;
    margin-top:15px;
}

.item{
    background:#0f172a;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
}

/* ====== الأقسام ====== */
.section{
    padding:60px 20px;
}

.title{
    text-align:center;
    font-size:24px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    max-width:1000px;
    margin:auto;
}

.box{
    background:#0f172a;
    padding:20px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

.box:hover{
    transform:translateY(-5px);
    border-color:#4cc9f0;
}

/* ====== موبايل ====== */
@media(max-width:768px){

    nav{
        display:none;
    }

    .hero h1{
        font-size:24px;
    }

    .search{
        flex-direction:column;
    }

    .search button{
        width:100%;
    }
}

</style>

</head>

<body>

<header>

<div class="logo">AutoDiag</div>

<nav>
<a href="#">الرئيسية</a>
<a href="#">الأكواد</a>
<a href="#">الكنترولات</a>
<a href="#">الحساسات</a>
</nav>

</header>

<!-- ====== HERO ====== -->
<section class="hero">

<h1>نظام تشخيص كهرباء السيارات</h1>
<p>ابحث عن أي كود أو حساس أو كنترول بسرعة</p>

<div class="search">
<input id="searchInput" placeholder="مثال: MR 4040">
<button onclick="search()">بحث</button>
</div>

<div class="results" id="results"></div>

</section>

<!-- ====== SECTIONS ====== -->
<section class="section">

<div class="title">الأقسام الرئيسية</div>

<div class="grid">

<div class="box">
<h3>أكواد الأعطال</h3>
</div>

<div class="box">
<h3>الكنترولات</h3>
</div>

<div class="box">
<h3>الحساسات</h3>
</div>

<div class="box">
<h3>المخططات</h3>
</div>

</div>

</section>

<script>

const data = [
{
name:"MR 4040",
desc:"خلل في ضغط الوقود"
},
{
name:"FR 3130",
desc:"مشكلة اتصال CAN"
},
{
name:"CPC 1110",
desc:"انخفاض جهد التغذية"
}
];

function search(){

let val =
document.getElementById("searchInput").value.toLowerCase();

let res =
document.getElementById("results");

res.innerHTML="";

let found =
data.filter(x =>
x.name.toLowerCase().includes(val)
);

if(found.length==0){
res.innerHTML="<div class='item'>لا توجد نتائج</div>";
return;
}

found.forEach(x=>{
res.innerHTML +=
`<div class="item">
<b>${x.name}</b><br>
${x.desc}
</div>`;
});

}

</script>

</body>
</html>
