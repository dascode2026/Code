<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAS System</title>
    <style>
        /* --- الألوان الأساسية العميقة المتناسقة --- */
        :root {
            --bg-dark: #090d16;        /* خلفية داكنة غامقة وعميقة لمنع البهتان */
            --card-bg: #131c2e;        /* لون بطاقات الأعطال (أزرق ليلي) */
            --header-bg: #111827;      /* لون الهيدر الأساسي */
            --input-bg: #0d1321;       /* خلفية مربع البحث */
            --text-main: #f8fafc;      /* النص الأبيض الناعم */
            --text-muted: #94a3b8;     /* النص الثانوي */
            --accent-blue: #00b4d8;    /* أزرق نيون مشع */
            --border-glow: #1e293b;    /* حدود البطاقات الافتراضية */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 50px;
        }

        /* --- الهيدر (Header) بتوزيع مخصص --- */
        header {
            background-color: var(--header-bg);
            border-bottom: 2px solid var(--accent-blue);
            padding: 12px 25px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            gap: 15px;
        }

        /* مربع البحث بعرض محدد ومقلص */
        .header-right {
            flex: 0 1 450px;
            width: 100%;
        }

        .search-box {
            width: 100%;
            padding: 10px 18px;
            background-color: var(--input-bg);
            border: 2px solid var(--border-glow);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 16px; /* حجم 16 يمنع زووم المتصفح التلقائي على الآيفون والأندرويد */
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(0, 180, 216, 0.25);
            background-color: #0f172a;
        }

        /* اسم الموقع DAS فقط */
        .header-left {
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.4);
            letter-spacing: 1px;
            user-select: none;
        }

        /* --- الحاوية الرئيسية ومؤشر النتائج --- */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-bar {
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-muted);
            background-color: #111827;
            padding: 8px 16px;
            border-radius: 6px;
            width: fit-content;
            border: 1px solid #1e293b;
        }

        /* --- نظام مجموعات الأقسام --- */
        .system-group {
            margin-bottom: 35px;
        }

        /* اسم القسم الرئيسي الذي يظهر مرة واحدة في الأعلى */
        .system-main-title {
            color: #22d3ee;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-right: 8px;
            border-right: 4px solid var(--accent-blue);
            display: inline-block;
        }

        /* حاوية البطاقات التابعة للقسم */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* كرت العطل المعزول للأكواد التابعة */
        .fault-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 10px;
            padding: 18px 22px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .fault-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 16px rgba(0, 180, 216, 0.12);
        }

        /* تفاصيل الكود والوصف بالداخل */
        .fault-details {
            display: flex;
            align-items: baseline;
            gap: 20px;
        }

        /* كود العطل البارز */
        .fault-code-text {
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 19px;
            font-weight: 800;
            min-width: 75px;
        }

        /* وصف العطل المنسق */
        .fault-desc-text {
            font-size: 16px;
            color: #e2e8f0;
            line-height: 1.5;
            font-weight: 500;
        }

        /* حالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            padding: 50px 20px;
            background-color: var(--card-bg);
            border-radius: 12px;
            color: var(--text-muted);
            border: 1px dashed #1e293b;
        }

        /* --- التوافق الكامل مع الجوال --- */
        @media (max-width: 480px) {
            header {
                padding: 12px 15px;
            }
            
            .header-container {
                gap: 10px;
            }

            .header-right {
                flex: 1;
            }

            .logo {
                font-size: 24px;
            }

            .system-main-title {
                font-size: 16px;
            }

            .fault-details {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            .fault-code-text {
                font-size: 17px;
                color: var(--accent-blue);
            }

            .fault-desc-text {
                font-size: 15px;
            }
        }
    </style>
</head>

        // دالة عرض البيانات
        function showFaults(data) {
            const resultsContainer = document.getElementById('resultsContainer');
            const statsBar = document.getElementById('statsBar');
            resultsContainer.innerHTML = '';
            
            if (data.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">لا توجد نتائج مطابقة</div>';
                statsBar.innerText = 'تم العثور على: 0 عطل';
                return;
            }

            // تجميع الأعطال حسب النظام
            const grouped = data.reduce((acc, item) => {
                if (!acc[item.system]) acc[item.system] = [];
                acc[item.system].push(item);
                return acc;
            }, {});

            Object.keys(grouped).forEach(systemName => {
                const systemGroup = document.createElement('div');
                systemGroup.className = 'system-group';
                
                let cardsListHtml = '<div class="system-main-title">' + systemName + '</div><div class="cards-list">';
                grouped[systemName].forEach(fault => {
                    cardsListHtml += `
                        <div class="fault-card">
                            <div class="fault-details">
                                <div class="fault-code-text">${fault.code}</div>
                                <div class="fault-desc-text">${fault.desc}</div>
                            </div>
                        </div>
                    `;
                });
                cardsListHtml += '</div>';
                systemGroup.innerHTML = cardsListHtml;
                resultsContainer.appendChild(systemGroup);
            });

            statsBar.innerText = `تم العثور على: ${data.length} عطل`;
        }

        // دالة البحث
        function doSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtered = faultDatabase.filter(item => 
                item.code.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query) ||
                item.system.toLowerCase().includes(query)
            );
            showFaults(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', doSearch);
        document.addEventListener('DOMContentLoaded', () => showFaults(faultDatabase));
    </script>
